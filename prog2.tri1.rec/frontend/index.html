<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmação de Presença</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #f5f0e8;
      --ink:      #1a1410;
      --gold:     #b8973a;
      --gold-lt:  #d4b96a;
      --rust:     #8b3a2a;
      --sage:     #4a5e4a;
      --muted:    #7a6e60;
      --border:   #d8cfc2;
      --card-bg:  #faf7f2;
      --shadow:   0 4px 24px rgba(26,20,16,.10);
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ─────────────────────────────── */
    header {
      width: 100%;
      padding: 56px 24px 40px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      background: linear-gradient(180deg, #ede8de 0%, var(--cream) 100%);
    }

    .header-ornament {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 6px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: block;
    }

    header h1 {
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 300;
      letter-spacing: -0.5px;
      line-height: 1.1;
      color: var(--ink);
    }

    header h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .header-sub {
      margin-top: 12px;
      font-size: 1.05rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .header-rule {
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 20px auto 0;
    }

    /* ── STATS BAR ───────────────────────────── */
    #stats-bar {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 2px;
      margin: 36px 24px 0;
      overflow: hidden;
      box-shadow: var(--shadow);
      animation: fadeUp .5s ease both;
    }

    .stat-cell {
      background: var(--card-bg);
      padding: 20px 16px;
      text-align: center;
      border-right: 1px solid var(--border);
      transition: background .2s;
    }
    .stat-cell:last-child { border-right: none; }

    .stat-value {
      font-size: 2rem;
      font-weight: 600;
      color: var(--ink);
      display: block;
      line-height: 1;
      transition: color .3s;
    }

    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-top: 6px;
    }

    .stat-cell.confirmados .stat-value { color: var(--sage); }
    .stat-cell.ausentes    .stat-value { color: var(--rust); }
    .stat-cell.acomp       .stat-value { color: var(--gold); }

    /* ── MAIN CONTENT ────────────────────────── */
    main {
      width: 100%;
      max-width: 900px;
      padding: 40px 24px 80px;
      flex: 1;
    }

    /* ── SEARCH ──────────────────────────────── */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .search-wrapper {
      position: relative;
      margin-bottom: 8px;
    }

    #search-input {
      width: 100%;
      padding: 16px 20px 16px 52px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 300;
      color: var(--ink);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    #search-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,151,58,.12);
    }

    #search-input::placeholder { color: var(--muted); opacity: .7; }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 1.1rem;
      pointer-events: none;
    }

    /* ── RESULTS LIST ────────────────────────── */
    #results-list {
      list-style: none;
      border: 1px solid var(--border);
      border-top: none;
      background: var(--card-bg);
      border-radius: 0 0 2px 2px;
      overflow: hidden;
      display: none;
      animation: fadeDown .2s ease;
    }

    #results-list.visible { display: block; }

    #results-list li {
      padding: 14px 20px;
      cursor: pointer;
      font-size: 1.15rem;
      font-weight: 300;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background .15s;
    }

    #results-list li:first-child { border-top: none; }
    #results-list li:hover { background: #ede8de; }

    #results-list li .badge {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .badge.confirmed  { background: #ddf0e2; color: var(--sage); }
    .badge.pending    { background: #f0e8dd; color: var(--rust); }

    .no-results {
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-style: italic;
      font-size: 1rem;
    }

    /* ── CONFIRMATION CARD ───────────────────── */
    #confirm-card {
      margin-top: 36px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      display: none;
      animation: fadeUp .35s ease both;
      box-shadow: var(--shadow);
    }

    #confirm-card.visible { display: block; }

    .card-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card-name {
      font-size: 1.9rem;
      font-weight: 300;
      color: var(--ink);
    }

    .card-name span {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .btn-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.3rem;
      padding: 4px;
      line-height: 1;
      transition: color .15s;
    }
    .btn-close:hover { color: var(--rust); }

    .card-body { padding: 28px; }

    /* Toggle */
    .toggle-group {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .toggle-btn {
      flex: 1;
      padding: 14px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--cream);
      color: var(--muted);
      border-radius: 2px;
      transition: all .2s;
      letter-spacing: 0.5px;
    }

    .toggle-btn:hover { border-color: var(--gold); color: var(--ink); }

    .toggle-btn.active-yes {
      background: var(--sage);
      border-color: var(--sage);
      color: #fff;
    }

    .toggle-btn.active-no {
      background: var(--rust);
      border-color: var(--rust);
      color: #fff;
    }

    /* Acompanhantes */
    #acomp-section {
      display: none;
      margin-bottom: 28px;
      animation: fadeUp .25s ease both;
    }

    #acomp-section.visible { display: block; }

    .field-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 10px;
    }

    .counter-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .counter-btn {
      width: 40px;
      height: 40px;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: var(--cream);
      color: var(--ink);
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      font-family: 'DM Mono', monospace;
      line-height: 1;
    }

    .counter-btn:hover { border-color: var(--gold); background: #ede8de; }

    #acomp-value {
      font-size: 1.8rem;
      font-weight: 300;
      min-width: 32px;
      text-align: center;
      color: var(--ink);
    }

    /* Save button */
    #btn-save {
      width: 100%;
      padding: 16px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      letter-spacing: 1px;
      cursor: pointer;
      border: none;
      border-radius: 2px;
      background: var(--ink);
      color: var(--cream);
      transition: background .2s, transform .1s;
    }

    #btn-save:hover:not(:disabled) {
      background: var(--gold);
      color: var(--ink);
    }

    #btn-save:active:not(:disabled) { transform: scale(.99); }
    #btn-save:disabled { opacity: .45; cursor: not-allowed; }

    /* ── TOAST ───────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      padding: 12px 24px;
      border-radius: 2px;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 9999;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.error { background: var(--rust); }
    #toast.success { background: var(--sage); }

    /* ── FOOTER ──────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      width: 100%;
    }

    /* ── ANIMATIONS ──────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }

    .stat-value.updated { animation: pulse .4s ease; }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 600px) {
      #stats-bar { grid-template-columns: repeat(2, 1fr); }
      .stat-cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
      .stat-cell:nth-child(2) { border-right: none; }
      .stat-cell:nth-child(3),
      .stat-cell:nth-child(4) { border-bottom: none; }
      header h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <span class="header-ornament">Confirmação de Presença</span>
    <h1>Você está <em>convidado</em></h1>
    <p class="header-sub">Confirme sua presença no evento abaixo</p>
    <div class="header-rule"></div>
  </header>

  <!-- ESTATÍSTICAS -->
  <div id="stats-bar">
    <div class="stat-cell">
      <span class="stat-value" id="stat-total">—</span>
      <span class="stat-label">Convidados</span>
    </div>
    <div class="stat-cell confirmados">
      <span class="stat-value" id="stat-confirmados">—</span>
      <span class="stat-label">Confirmados</span>
    </div>
    <div class="stat-cell ausentes">
      <span class="stat-value" id="stat-ausentes">—</span>
      <span class="stat-label">Ausentes</span>
    </div>
    <div class="stat-cell acomp">
      <span class="stat-value" id="stat-acomp">—</span>
      <span class="stat-label">Acompanhantes</span>
    </div>
  </div>

  <!-- MAIN -->
  <main>
    <p class="section-label">Pesquisar convidado</p>

    <div class="search-wrapper">
      <span class="search-icon">⌕</span>
      <input
        type="text"
        id="search-input"
        placeholder="Digite seu nome..."
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <ul id="results-list"></ul>

    <!-- CARD DE CONFIRMAÇÃO -->
    <div id="confirm-card">
      <div class="card-header">
        <div class="card-name">
          <span>Convidado selecionado</span>
          <span id="selected-name-display"></span>
        </div>
        <button class="btn-close" id="btn-close" title="Fechar">✕</button>
      </div>
      <div class="card-body">

        <div class="toggle-group">
          <button class="toggle-btn" id="btn-yes" data-choice="yes">
            ✓ &nbsp; Vou comparecer
          </button>
          <button class="toggle-btn" id="btn-no" data-choice="no">
            ✗ &nbsp; Não poderei ir
          </button>
        </div>

        <div id="acomp-section">
          <span class="field-label">Número de acompanhantes</span>
          <div class="counter-row">
            <button class="counter-btn" id="btn-dec">−</button>
            <span id="acomp-value">0</span>
            <button class="counter-btn" id="btn-inc">+</button>
          </div>
        </div>

        <button id="btn-save" disabled>Salvar confirmação</button>
      </div>
    </div>
  </main>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- FOOTER -->
  <footer>Sistema de RSVP &nbsp;·&nbsp; Programação II</footer>

  <script src="app.js"></script>
</body>
</html>
